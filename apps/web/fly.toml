# UniSi web — Next.js standalone on Fly.io.
# Set non-secret env from this file; secrets via:  fly secrets set KEY=value -a unisi-web

app = "unisi-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  AGNIC_API_BASE = "https://api.agnic.ai"
  NEXT_PUBLIC_AGNIC_AUTH_URL = "https://app.agnic.ai"
  NEXT_PUBLIC_AGNIC_TOPUP_URL = "https://app.agnic.ai/topup"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 500

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Required secrets (set via `fly secrets set`):
#   SESSION_SECRET
#   AGNIC_OAUTH_CLIENT_ID
#   NEXT_PUBLIC_AGNIC_OAUTH_CLIENT_ID
#   NEXT_PUBLIC_APP_URL
#   AGNIC_PARTNER_ID                 (optional, when approved)
#   DATABASE_URL                     (Fly Postgres or Neon)
#   REDIS_URL                        (Upstash or Fly Redis)
#   S3_ENDPOINT, S3_BUCKET, S3_REGION,
#   S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY
#   RESEND_API_KEY
